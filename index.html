const SUPABASE_URL = "https://bwpoawofjajmmmblttfm.supabase.co";
const SUPABASE_KEY = "sb_publishable_zhryO5D1io9JfclGACkrEg_RmxVHImp";

const STORAGE_KEY = "partnership_v2";
const SYNC_ON = SUPABASE_URL.indexOf("supabase.co") !== -1 && SUPABASE_KEY.length > 20;

const DEFAULT_DATA = {
  settings: { p1: "Mohamed", p2: "Ahmed", share2: 0.2 },
  // each company: { moves:[{id,date,desc,type:'in'|'out',amount}], draws:[{id,date,who,amount}] }
  companies: {
    c1: { name: "Company 1", moves: [], draws: [] },
    c2: { name: "Company 2", moves: [], draws: [] },
    c3: { name: "Company 3", moves: [], draws: [] },
    re: { name: "Real Estate", moves: [], draws: [] },
  },
  // Company debts. Each: {id,date,dir:'coOwes'|'owesCo',co,person,amount,desc,payments:[{id,date,amount,desc}]}
  //   dir 'coOwes'  = the company owes the person (repayments leave the company Kasse)
  //   dir 'owesCo'  = the person owes the company (repayments come INTO the company Kasse)
  debts: [],
  // legacy (old simple repays) — kept so old data still loads; no longer written
  repays: [],
  // Personal debts between anyone (not tied to any Kasse):
  //   {id,date,dir:'aOwesB',from,to,amount,desc,payments:[{id,date,amount,desc}]}
  personal: [],
  // saved counterparty names the user has typed, to reuse from a dropdown
  people: [],
};

async function loadAll() {
  if (SYNC_ON) {
    try {
      const res = await fetch(
        SUPABASE_URL + "/rest/v1/app_state?key=eq." + ROW_KEY + "&select=data",
        { headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY } }
      );
      const rows = await res.json();
      if (rows && rows[0] && rows[0].data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rows[0].data));
        return mergeDefaults(rows[0].data);
      }
    } catch (e) { console.error("cloud load failed", e); }
  }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return mergeDefaults(JSON.parse(raw));
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function mergeDefaults(d) {
  const out = JSON.parse(JSON.stringify(DEFAULT_DATA));
  if (d.settings) out.settings = { ...out.settings, ...d.settings };
  if (d.companies) {
    for (const k of Object.keys(out.companies)) {
      if (d.companies[k]) {
        out.companies[k].name = d.companies[k].name || out.companies[k].name;
        out.companies[k].moves = d.companies[k].moves || [];
        out.companies[k].draws = d.companies[k].draws || [];
      }
    }
  }
  out.debts = (d.debts || []).map((x) => x.payments ? x : { ...x, dir: x.dir || "coOwes", person: x.person || x.who, payments: [] });
  out.repays = d.repays || [];
  out.personal = (d.personal || []).map((x) => x.payments ? x : { ...x, dir: x.dir || "aOwesB", payments: [] });
  out.people = d.people || [];
  return out;
}

async function saveAll(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  if (SYNC_ON) {
    try {
      await fetch(SUPABASE_URL + "/rest/v1/app_state?on_conflict=key", {
        method: "POST",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates",
        },
        body: JSON.stringify({ key: ROW_KEY, data }),
      });
    } catch (e) { console.error("cloud save failed", e); }
  }
}

/* Reusable row that can flip into an inline edit form.
   fields: [{key,label,type:'text'|'number'|'date'|'select', options?}]
   view(): the read-only JSX shown normally.
   onSave(patch), onDelete(). */
function EditRow({ entry, fields, view, onSave, onDelete, rowStyle, extraButtons }) {
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState(entry);
  React.useEffect(() => { setForm(entry); }, [entry]);

  if (editing) {
    const chunks = [];
    for (let i = 0; i < fields.length; i += 2) chunks.push(fields.slice(i, i + 2));
    return (
      <div className="editbox">
        {chunks.map((pair, idx) => (
          <div className="er" key={idx}>
            {pair.map((f) => (
              <div key={f.key}>
                <label>{f.label}</label>
                {f.type === "select" ? (
                  <select value={form[f.key] ?? ""} onChange={(e) => setForm({ ...form, [f.key]: e.target.value })}>
                    {f.options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                ) : (
                  <input
                    type={f.type === "number" ? "number" : f.type === "date" ? "date" : "text"}
                    inputMode={f.type === "number" ? "decimal" : undefined}
                    value={form[f.key] ?? ""}
                    onChange={(e) => setForm({ ...form, [f.key]: e.target.value })}
                  />
                )}
              </div>
            ))}
          </div>
        ))}
        <div className="acts">
          <button className="cancel" onClick={() => { setForm(entry); setEditing(false); }}>Cancel</button>
          <button className="save" onClick={() => { onSave(form); setEditing(false); }}>Save</button>
        </div>
      </div>
    );
  }

  return (
    <div className="entry" style={rowStyle}>
      {view}
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        {extraButtons}
        <button className="editbtn" onClick={() => setEditing(true)}>edit</button>
        <button className="removebtn" onClick={() => { if (window.confirm("Remove this entry? This can't be undone.")) onDelete(); }}>Remove</button>
      </div>
    </div>
  );
}

/* --------------------------- Calc per company --------------------------- */
function calcCompany(co, share2, p1, p2, debts, ckey) {
  let income = 0, expense = 0;
  co.moves.forEach((m) => {
    if (m.type === "in") income += n(m.amount);
    else expense += n(m.amount);
  });
  const net = income - expense;                    // صافي قبل السحب
  let drawP1 = 0, drawP2 = 0;
  co.draws.forEach((d) => {
    if (d.who === p1) drawP1 += n(d.amount);
    else if (d.who === p2) drawP2 += n(d.amount);
  });
  const totalDraw = drawP1 + drawP2;
  // debt payments touching THIS company's Kasse:
  //  - company paying back what it owes  -> money leaves  (−)
  //  - someone paying back the company    -> money comes in (+)
  let kasseDebtEffect = 0;
  (debts || []).forEach((d) => {
    if (d.co !== ckey) return;
    const paid = (d.payments || []).reduce((s, p) => s + n(p.amount), 0);
    if (d.dir === "coOwes") kasseDebtEffect -= paid;
    else if (d.dir === "owesCo") kasseDebtEffect += paid;
  });
  const repaid = -kasseDebtEffect; // for display: positive means net money left
  const kasse = net - totalDraw + kasseDebtEffect;
  const dueP1 = net * (1 - share2);                // نصيب محمد المستحق
  const dueP2 = net * share2;                       // نصيب أحمد المستحق
  const balP1 = drawP1 - dueP1;                     // + واخد زيادة / - لسه ليه
  const balP2 = drawP2 - dueP2;
  return { income, expense, net, kasse, repaid, drawP1, drawP2, dueP1, dueP2, balP1, balP2 };
}

/* ---- Real Estate: simple ledger, all amounts in EUR.
       Ahmed pays installments, Mohamed pays him back the same amount.
       EGP amount + rate are optional notes for documentation only —
       they do NOT affect any calculation.  ---- */
function calcRE(co) {
  let paidByP2 = 0;
  co.moves.forEach((m) => { paidByP2 += n(m.amount); });
  let sentToP2 = 0;
  co.draws.forEach((d) => { sentToP2 += n(d.amount); });
  const balP2 = sentToP2 - paidByP2;   // − لسه ليه / + اتسلم زيادة
  return { paidByP2, sentToP2, balP2 };
}

/* ------------------------------ Components ------------------------------ */

  const addMove = () => {
    if (!mv.amount) return;
    const co2 = { ...co, moves: [{ id: uid(), type: mode, ...mv }, ...co.moves] };
    set({ ...data, companies: { ...data.companies, [ckey]: co2 } });
    setMv({ date: "", desc: "", amount: "" });

    if (!dw.amount) return;
    const co2 = { ...co, draws: [{ id: uid(), ...dw }, ...co.draws] };

    setDw({ date: "", who: p1, amount: "" });

    set({ ...data, companies: { ...data.companies, [ckey]: { ...co, draws: co.draws.filter((d) => d.id !== id) } } });
  const editMove = (patch) =>
    set({ ...data, companies: { ...data.companies, [ckey]: { ...co, moves: co.moves.map((m) => (m.id === patch.id ? patch : m)) } } });
  const editDraw = (patch) =>
    set({ ...data, companies: { ...data.companies, [ckey]: { ...co, draws: co.draws.map((d) => (d.id === patch.id ? patch : d)) } } });

  const balClass = (v) => (Math.abs(v) < 0.005 ? "z" : v > 0 ? "p" : "n");

            <div className="col"><div className="t">Einnahmen</div><div className="v pos mono">{eur(c.income)}</div></div>
            <div className="col"><div className="t">Ausgaben</div><div className="v neg mono">{eur(c.expense)}</div></div>
            <div className="col"><div className="t">Net</div><div className="v mono">{eur(c.net)}</div></div>
          </div>
        </div>
      </div>

      {/* Balances */}
      <div className="card">
        <div className="card-h"><h2>Balances</h2></div>
        <div className="card-b">
          <div className={"bal " + balClass(c.balP1)}>
            <div><div className="who">{p1} (80%)</div><div className="st">Due {eur(c.dueP1)} · Took {eur(c.drawP1)} · {balState(c.balP1)}</div></div>
            <div className={"amt mono " + (c.balP1 > 0 ? "pos" : c.balP1 < 0 ? "neg" : "")}>{eur(c.balP1)}</div>
          </div>
          <div className={"bal " + balClass(c.balP2)} style={{ marginTop: 8 }}>
            <div><div className="who">{p2} (20%)</div><div className="st">Due {eur(c.dueP2)} · Took {eur(c.drawP2)} · {balState(c.balP2)}</div></div>

          </div>
          <div className="note">− means still owed to them · + means they took extra · 0 means settled.</div>

      {/* Add income / expense */}

}

function RealEstateView({ data, set }) {
  const co = data.companies.re;

  const c = calcRE(co);

  const [mv, setMv] = useState({ date: "", desc: "", amount: "", egp: "", rate: "" });
  const [dw, setDw] = useState({ date: "", amount: "", egp: "", rate: "", desc: "" });

  const addPaid = () => {
    if (!mv.amount) return;
    const co2 = { ...co, moves: [{ id: uid(), type: "in", ...mv }, ...co.moves] };
    set({ ...data, companies: { ...data.companies, re: co2 } });
    setMv({ date: "", desc: "", amount: "", egp: "", rate: mv.rate });
  };
  const addSent = () => {
    if (!dw.amount) return;
    const co2 = { ...co, draws: [{ id: uid(), who: p2, ...dw }, ...co.draws] };
    set({ ...data, companies: { ...data.companies, re: co2 } });
    setDw({ date: "", amount: "", egp: "", rate: dw.rate, desc: "" });
  };
  const delMove = (id) =>
    set({ ...data, companies: { ...data.companies, re: { ...co, moves: co.moves.filter((m) => m.id !== id) } } });
  const delDraw = (id) =>
    set({ ...data, companies: { ...data.companies, re: { ...co, draws: co.draws.filter((d) => d.id !== id) } } });
  const editMove = (patch) =>
    set({ ...data, companies: { ...data.companies, re: { ...co, moves: co.moves.map((m) => (m.id === patch.id ? patch : m)) } } });
  const editDraw = (patch) =>
    set({ ...data, companies: { ...data.companies, re: { ...co, draws: co.draws.map((d) => (d.id === patch.id ? patch : d)) } } });

  const remaining = Math.max(0, -c.balP2);
  const balCls = Math.abs(c.balP2) < 0.005 ? "z" : c.balP2 > 0 ? "p" : "n";
  const balState = Math.abs(c.balP2) < 0.005 ? "Settled" : c.balP2 > 0 ? "Got extra (+)" : "Still owed (−)";

            <div className="col"><div className="t">{p1} sent back</div><div className="v mono">{eur(c.sentToP2)}</div></div>
            <div className="col"><div className="t">Balance</div><div className={"v mono " + (c.balP2 > 0 ? "pos" : c.balP2 < 0 ? "neg" : "")}>{eur(c.balP2)}</div></div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Balance</h2></div>
        <div className="card-b">
          <div className={"bal " + balCls}>
            <div>
              <div className="who">{p2}</div>
              <div className="st">Paid {eur(c.paidByP2)} · Received {eur(c.sentToP2)} · {balState}</div>
            </div>
            <div className={"amt mono " + (c.balP2 > 0 ? "pos" : c.balP2 < 0 ? "neg" : "")}>{eur(c.balP2)}</div>
          </div>
          <div className="note">
            {p2} pays the property installments from his own pocket. {p1} pays him back the same amount in €.
            The EGP amount and rate are optional — recorded for your reference only, they don't affect the balance.

      <div className="card">

        <div className="card-b">
          <div className="frow">

/* =========================== DEBTS (companies) ===========================
   Each debt has a direction, a counterparty name, description, amount, and a
   list of payments. dir 'coOwes' = company owes person; 'owesCo' = person owes
   the company. Payments move money in/out of that company's Kasse (handled in
   calcCompany). Here we just compute remaining per debt and totals. */
function debtPaid(d) { return (d.payments || []).reduce((s, p) => s + n(p.amount), 0); }
function debtRemaining(d) { return n(d.amount) - debtPaid(d); }

function DebtsView({ data, set }) {
  const { p1, p2 } = data.settings;
  const cashCos = Object.keys(data.companies).filter((k) => k !== "re");
  const coName = (k) => (data.companies[k] ? data.companies[k].name : k);

  // suggested names: partners + any saved people
  const savedPeople = data.people || [];
  const nameOptions = Array.from(new Set([p1, p2, ...savedPeople]));

  const [f, setF] = useState({ date: "", dir: "coOwes", co: cashCos[0], person: p1, newPerson: "", amount: "", desc: "" });
  const [payFor, setPayFor] = useState(null); // debt id being paid
  const [pay, setPay] = useState({ date: "", amount: "", desc: "" });

  const rememberPerson = (name) => {
    if (!name) return data.people || [];
    if (name === p1 || name === p2) return data.people || [];
    if ((data.people || []).includes(name)) return data.people || [];
    return [...(data.people || []), name];
  };

  const addDebt = () => {
    const person = f.person === "__new__" ? f.newPerson.trim() : f.person;
    if (!f.amount || !person) return;
    const people = rememberPerson(person);
    set({
      ...data,
      people,
      debts: [{ id: uid(), date: f.date, dir: f.dir, co: f.co, person, amount: f.amount, desc: f.desc, payments: [] }, ...(data.debts || [])],
    });
    setF({ ...f, amount: "", desc: "", newPerson: "", date: "" });
  };
  const delDebt = (id) => set({ ...data, debts: (data.debts || []).filter((x) => x.id !== id) });
  const editDebt = (patch) => set({ ...data, debts: (data.debts || []).map((x) => (x.id === patch.id ? { ...x, ...patch } : x)) });

  const addPayment = (debtId) => {
    if (!pay.amount) return;
    set({
      ...data,
      debts: (data.debts || []).map((d) =>
        d.id === debtId ? { ...d, payments: [{ id: uid(), ...pay }, ...(d.payments || [])] } : d
      ),
    });
    setPay({ date: "", amount: "", desc: "" });
    setPayFor(null);
  };
  const delPayment = (debtId, payId) =>
    set({
      ...data,
      debts: (data.debts || []).map((d) =>
        d.id === debtId ? { ...d, payments: (d.payments || []).filter((p) => p.id !== payId) } : d
      ),
    });

  // totals per direction
  let coOwesTotal = 0, owesCoTotal = 0;
  (data.debts || []).forEach((d) => {
    const rem = debtRemaining(d);
    if (d.dir === "coOwes") coOwesTotal += rem;
    else owesCoTotal += rem;
  });

  const dirLabel = (d) => (d.dir === "coOwes" ? coName(d.co) + " owes " + d.person : d.person + " owes " + coName(d.co));

  return (
    <div className="wrap">
      <div className="card">
        <div className="card-h"><h2>Open debts</h2></div>
        <div className="card-b">
          <div className="kpi"><span className="lab">Companies still owe others</span><span className={"val mono " + (coOwesTotal > 0.005 ? "neg" : "")}>{eur(coOwesTotal)}</span></div>
          <div className="kpi"><span className="lab">Others still owe the companies</span><span className={"val mono " + (owesCoTotal > 0.005 ? "pos" : "")}>{eur(owesCoTotal)}</span></div>
          <div className="note">
            Pick a direction for each debt. Repayments move money in or out of the
            chosen company's Kasse. You can pay in parts — the remaining shows below.
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Add a debt</h2></div>
        <div className="card-b">
          <div className="fld"><label>Direction</label>
            <select value={f.dir} onChange={(e) => setF({ ...f, dir: e.target.value })}>
              <option value="coOwes">Company owes someone</option>
              <option value="owesCo">Someone owes the company</option>
            </select>
          </div>
          <div className="frow">
            <div className="fld"><label>Date</label><input type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} /></div>
            <div className="fld"><label>Amount (€)</label><input type="number" inputMode="decimal" value={f.amount} onChange={(e) => setF({ ...f, amount: e.target.value })} /></div>
          </div>
          <div className="frow">
            <div className="fld"><label>Which company?</label>
              <select value={f.co} onChange={(e) => setF({ ...f, co: e.target.value })}>
                {cashCos.map((k) => <option key={k} value={k}>{coName(k)}</option>)}
              </select>
            </div>
            <div className="fld"><label>{f.dir === "coOwes" ? "Owes who?" : "Who owes?"}</label>
              <select value={f.person} onChange={(e) => setF({ ...f, person: e.target.value })}>
                {nameOptions.map((nm) => <option key={nm} value={nm}>{nm}</option>)}
                <option value="__new__">+ New name…</option>
              </select>
            </div>
          </div>
          {f.person === "__new__" && (
            <div className="fld"><label>New name</label><input value={f.newPerson} onChange={(e) => setF({ ...f, newPerson: e.target.value })} placeholder="type a name" /></div>
          )}
          <div className="fld"><label>Description</label><input value={f.desc} onChange={(e) => setF({ ...f, desc: e.target.value })} placeholder="what is this debt for?" /></div>
          <button className="add" onClick={addDebt}>Add debt</button>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Debts</h2></div>
        <div className="card-b">
          {(data.debts || []).length === 0 && <div className="empty">No debts yet.</div>}
          {(data.debts || []).map((d) => {
            const rem = debtRemaining(d);
            const paid = debtPaid(d);
            const done = rem < 0.005;
            return (
              <div className="entry" key={d.id} style={{ display: "block", background: done ? "#eef5ee" : "#fff" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                  <div>
                    <div className="desc">{dirLabel(d)}{d.desc ? " · " + d.desc : ""}</div>
                    <div className="date">{d.date || "—"} · amount {eur(n(d.amount))} · paid {eur(paid)}</div>
                  </div>
                  <div className={"amt mono " + (done ? "pos" : "neg")}>{done ? "Settled" : eur(rem)}</div>
                </div>
                {(d.payments || []).length > 0 && (
                  <div style={{ marginTop: 8, paddingLeft: 8, borderLeft: "2px solid var(--line)" }}>
                    {(d.payments || []).map((p) => (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: "var(--ink2)", padding: "3px 0" }}>
                        <span>{p.date || "—"}{p.desc ? " · " + p.desc : ""}</span>
                        <span style={{ display: "flex", gap: 8 }}>
                          <span className="mono">{eur(n(p.amount))}</span>
                          <button className="removebtn" style={{ fontSize: 12 }} onClick={() => { if (window.confirm("Remove this payment?")) delPayment(d.id, p.id); }}>remove</button>
                        </span>
                      </div>
                    ))}
                  </div>
                )}
                {payFor === d.id ? (
                  <div className="editbox" style={{ marginTop: 8 }}>
                    <div className="er">
                      <div><label>Date</label><input type="date" value={pay.date} onChange={(e) => setPay({ ...pay, date: e.target.value })} /></div>
                      <div><label>Amount (€)</label><input type="number" inputMode="decimal" value={pay.amount} onChange={(e) => setPay({ ...pay, amount: e.target.value })} /></div>
                    </div>
                    <div className="er"><div><label>Note</label><input value={pay.desc} onChange={(e) => setPay({ ...pay, desc: e.target.value })} placeholder="optional" /></div></div>
                    <div className="acts">
                      <button className="cancel" onClick={() => { setPayFor(null); setPay({ date: "", amount: "", desc: "" }); }}>Cancel</button>
                      <button className="save" onClick={() => addPayment(d.id)}>Save payment</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    {!done && <button className="add" style={{ padding: "8px", fontSize: 13 }} onClick={() => { setPayFor(d.id); setPay({ date: "", amount: "", desc: "" }); }}>Add payment</button>}
                    <button className="removebtn" onClick={() => { if (window.confirm("Remove this whole debt and its payments?")) delDebt(d.id); }}>Remove debt</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* =========================== PERSONAL (people) ===========================
   Private debts between anyone, unrelated to any company Kasse.
   {id,date,from,to,amount,desc,payments:[]} — "from owes to". */
function PersonalView({ data, set }) {
  const { p1, p2 } = data.settings;
  const savedPeople = data.people || [];
  const nameOptions = Array.from(new Set([p1, p2, ...savedPeople]));

  const [f, setF] = useState({ date: "", from: p1, fromNew: "", to: p2, toNew: "", amount: "", desc: "" });
  const [payFor, setPayFor] = useState(null);
  const [pay, setPay] = useState({ date: "", amount: "", desc: "" });

  const rememberPeople = (names) => {
    let list = data.people || [];
    names.forEach((nm) => {
      if (nm && nm !== p1 && nm !== p2 && !list.includes(nm)) list = [...list, nm];
    });
    return list;
  };

  const add = () => {
    const from = f.from === "__new__" ? f.fromNew.trim() : f.from;
    const to = f.to === "__new__" ? f.toNew.trim() : f.to;
    if (!f.amount || !from || !to || from === to) return;
    set({
      ...data,
      people: rememberPeople([from, to]),
      personal: [{ id: uid(), date: f.date, from, to, amount: f.amount, desc: f.desc, payments: [] }, ...(data.personal || [])],
    });
    setF({ ...f, amount: "", desc: "", fromNew: "", toNew: "", date: "" });
  };
  const del = (id) => set({ ...data, personal: (data.personal || []).filter((x) => x.id !== id) });
  const addPayment = (pid) => {
    if (!pay.amount) return;
    set({
      ...data,
      personal: (data.personal || []).map((d) =>
        d.id === pid ? { ...d, payments: [{ id: uid(), ...pay }, ...(d.payments || [])] } : d
      ),
    });
    setPay({ date: "", amount: "", desc: "" });
    setPayFor(null);
  };
  const delPayment = (pid, payId) =>
    set({
      ...data,
      personal: (data.personal || []).map((d) =>
        d.id === pid ? { ...d, payments: (d.payments || []).filter((p) => p.id !== payId) } : d
      ),
    });

  // net between the two partners specifically (informational)
  let p1ToP2 = 0, p2ToP1 = 0;
  (data.personal || []).forEach((d) => {
    const rem = n(d.amount) - (d.payments || []).reduce((s, p) => s + n(p.amount), 0);
    if (d.from === p1 && d.to === p2) p1ToP2 += rem;
    else if (d.from === p2 && d.to === p1) p2ToP1 += rem;
  });
  const net = p2ToP1 - p1ToP2; // positive => p1 owes p2 net... keep simple below

  return (
    <div className="wrap">
      <div className="card">
        <div className="card-h"><h2>Personal debts</h2></div>
        <div className="card-b">
          <div className="note">
            Private money between any people — not connected to the companies' Kasse.
            "A owes B". Pay in parts; the remaining updates automatically.
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Add a personal debt</h2></div>
        <div className="card-b">
          <div className="frow">
            <div className="fld"><label>Who owes? (from)</label>
              <select value={f.from} onChange={(e) => setF({ ...f, from: e.target.value })}>
                {nameOptions.map((nm) => <option key={nm} value={nm}>{nm}</option>)}
                <option value="__new__">+ New name…</option>
              </select>
            </div>
            <div className="fld"><label>Owes who? (to)</label>
              <select value={f.to} onChange={(e) => setF({ ...f, to: e.target.value })}>
                {nameOptions.map((nm) => <option key={nm} value={nm}>{nm}</option>)}
                <option value="__new__">+ New name…</option>
              </select>
            </div>
          </div>
          {f.from === "__new__" && <div className="fld"><label>New name (who owes)</label><input value={f.fromNew} onChange={(e) => setF({ ...f, fromNew: e.target.value })} /></div>}
          {f.to === "__new__" && <div className="fld"><label>New name (owed to)</label><input value={f.toNew} onChange={(e) => setF({ ...f, toNew: e.target.value })} /></div>}
          <div className="frow">
            <div className="fld"><label>Date</label><input type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} /></div>
            <div className="fld"><label>Amount (€)</label><input type="number" inputMode="decimal" value={f.amount} onChange={(e) => setF({ ...f, amount: e.target.value })} /></div>
          </div>
          <div className="fld"><label>Description</label><input value={f.desc} onChange={(e) => setF({ ...f, desc: e.target.value })} placeholder="what is this for?" /></div>
          <button className="add" onClick={add}>Add personal debt</button>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Debts</h2></div>
        <div className="card-b">
          {(data.personal || []).length === 0 && <div className="empty">No entries yet.</div>}
          {(data.personal || []).map((d) => {
            const paid = (d.payments || []).reduce((s, p) => s + n(p.amount), 0);
            const rem = n(d.amount) - paid;
            const done = rem < 0.005;
            return (
              <div className="entry" key={d.id} style={{ display: "block", background: done ? "#eef5ee" : "#fff" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                  <div>
                    <div className="desc">{d.from} owes {d.to}{d.desc ? " · " + d.desc : ""}</div>
                    <div className="date">{d.date || "—"} · amount {eur(n(d.amount))} · paid {eur(paid)}</div>
                  </div>
                  <div className={"amt mono " + (done ? "pos" : "neg")}>{done ? "Settled" : eur(rem)}</div>
                </div>
                {(d.payments || []).length > 0 && (
                  <div style={{ marginTop: 8, paddingLeft: 8, borderLeft: "2px solid var(--line)" }}>
                    {(d.payments || []).map((p) => (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: "var(--ink2)", padding: "3px 0" }}>
                        <span>{p.date || "—"}{p.desc ? " · " + p.desc : ""}</span>
                        <span style={{ display: "flex", gap: 8 }}>
                          <span className="mono">{eur(n(p.amount))}</span>
                          <button className="removebtn" style={{ fontSize: 12 }} onClick={() => { if (window.confirm("Remove this payment?")) delPayment(d.id, p.id); }}>remove</button>
                        </span>
                      </div>
                    ))}
                  </div>
                )}
                {payFor === d.id ? (
                  <div className="editbox" style={{ marginTop: 8 }}>
                    <div className="er">
                      <div><label>Date</label><input type="date" value={pay.date} onChange={(e) => setPay({ ...pay, date: e.target.value })} /></div>
                      <div><label>Amount (€)</label><input type="number" inputMode="decimal" value={pay.amount} onChange={(e) => setPay({ ...pay, amount: e.target.value })} /></div>
                    </div>
                    <div className="er"><div><label>Note</label><input value={pay.desc} onChange={(e) => setPay({ ...pay, desc: e.target.value })} placeholder="optional" /></div></div>
                    <div className="acts">
                      <button className="cancel" onClick={() => { setPayFor(null); setPay({ date: "", amount: "", desc: "" }); }}>Cancel</button>
                      <button className="save" onClick={() => addPayment(d.id)}>Save payment</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    {!done && <button className="add" style={{ padding: "8px", fontSize: 13 }} onClick={() => { setPayFor(d.id); setPay({ date: "", amount: "", desc: "" }); }}>Add payment</button>}
                    <button className="removebtn" onClick={() => { if (window.confirm("Remove this whole debt and its payments?")) del(d.id); }}>Remove debt</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Overview({ data }) {
  const { p1, p2, share2 } = data.settings;
  let totKasse = 0, totBalP1 = 0, totBalP2 = 0;
  const rows = Object.keys(data.companies).map((k) => {
    const co = data.companies[k];
    if (k === "re") {
      // Real estate: separate ledger, no cash box. Only Ahmed has a balance.
      const r = calcRE(co);
      totBalP2 += r.balP2;
      return { name: co.name, isRE: true, balP2: r.balP2, paid: r.paidByP2, sent: r.sentToP2 };
    }
    const c = calcCompany(co, share2, p1, p2, data.debts, k);
    totKasse += c.kasse; totBalP1 += c.balP1; totBalP2 += c.balP2;
    return { name: co.name, isRE: false, ...c };
  });
  const balCls = (v) => (v > 0 ? "pos" : v < 0 ? "neg" : "");
  // debt totals from the new model
  let coOwesTotal = 0, owesCoTotal = 0;
  (data.debts || []).forEach((d) => {
    const rem = n(d.amount) - (d.payments || []).reduce((s, p) => s + n(p.amount), 0);
    if (d.dir === "coOwes") coOwesTotal += rem; else owesCoTotal += rem;
  });
  let personalOpen = 0;
  (data.personal || []).forEach((d) => {
    personalOpen += n(d.amount) - (d.payments || []).reduce((s, p) => s + n(p.amount), 0);
  });
  return (
    <div className="wrap">
      <div className="card">
        <div className="card-b">
          <div className="kasse">
            <div className="lbl">Total cash (all companies)</div>
            <div className={"big mono " + (totKasse >= 0 ? "" : "neg")}>{eur(totKasse)}</div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-h"><h2>Total balances</h2></div>
        <div className="card-b">
          <div className={"bal " + (Math.abs(totBalP1) < 0.005 ? "z" : totBalP1 > 0 ? "p" : "n")}>
            <div><div className="who">{p1}</div><div className="st">{Math.abs(totBalP1) < 0.005 ? "Settled" : totBalP1 > 0 ? "Took extra (+)" : "Still owed (−)"}</div></div>
            <div className={"amt mono " + balCls(totBalP1)}>{eur(totBalP1)}</div>
          </div>
          <div className={"bal " + (Math.abs(totBalP2) < 0.005 ? "z" : totBalP2 > 0 ? "p" : "n")} style={{ marginTop: 8 }}>
            <div><div className="who">{p2}</div><div className="st">{Math.abs(totBalP2) < 0.005 ? "Settled" : totBalP2 > 0 ? "Took extra (+)" : "Still owed (−)"}</div></div>
            <div className={"amt mono " + balCls(totBalP2)}>{eur(totBalP2)}</div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-h"><h2>Per company</h2></div>
        <div className="card-b">
          {rows.map((r, i) => (
            <div className="kpi" key={i}>
              <span className="lab">{r.name}</span>
              {r.isRE ? (
                <span className={"val mono " + balCls(r.balP2)}>
                  {Math.abs(r.balP2) < 0.005 ? "Settled" : eur(r.balP2)}
                </span>
              ) : (
                <span className="val mono">Kasse {eur(r.kasse)}</span>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Open debts</h2></div>
        <div className="card-b">
          <div className="kpi">
            <span className="lab">Companies owe others</span>
            <span className={"val mono " + (coOwesTotal > 0.005 ? "neg" : "")}>
              {coOwesTotal > 0.005 ? eur(coOwesTotal) : "None"}
            </span>
          </div>
          <div className="kpi">
            <span className="lab">Others owe the companies</span>
            <span className={"val mono " + (owesCoTotal > 0.005 ? "pos" : "")}>
              {owesCoTotal > 0.005 ? eur(owesCoTotal) : "None"}
            </span>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h"><h2>Personal debts (open)</h2></div>
        <div className="card-b">
          <div className="kpi">
            <span className="lab">Total still open</span>
            <span className={"val mono " + (personalOpen > 0.005 ? "neg" : "")}>
              {personalOpen > 0.005 ? eur(personalOpen) : "None"}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

function Settings({ data, set }) {
  const s = data.settings;
  const upd = (k, v) => set({ ...data, settings: { ...s, [k]: v } });
  const updName = (ck, v) =>
    set({ ...data, companies: { ...data.companies, [ck]: { ...data.companies[ck], name: v } } });
  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "partnership-backup.json"; a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <div className="wrap">
      <div className="card">
        <div className="card-h"><h2>Names & share</h2></div>
        <div className="card-b">
          <div className="set-row"><label>Partner 1 (80%)</label><input value={s.p1} onChange={(e) => upd("p1", e.target.value)} /></div>
          <div className="set-row"><label>Partner 2 (20%)</label><input value={s.p2} onChange={(e) => upd("p2", e.target.value)} /></div>
          <div className="set-row"><label>Partner 2 share</label><input type="number" step="0.01" value={s.share2} onChange={(e) => upd("share2", n(e.target.value))} /></div>
        </div>
      </div>
      <div className="card">
        <div className="card-h"><h2>Company names</h2></div>
        <div className="card-b">
          {Object.keys(data.companies).map((ck) => (
            <div className="set-row" key={ck}><label>{ck}</label><input value={data.companies[ck].name} onChange={(e) => updName(ck, e.target.value)} /></div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="card-h"><h2>Backup</h2></div>
        <div className="card-b">
          <button className="big-btn" onClick={exportData}>Export backup file</button>
          <div className="note">Sync is {SYNC_ON ? "ON — you and " + s.p2 + " share the same data." : "OFF (local only)."}</div>
        </div>
      </div>
      <div className="card">
        <div className="card-h"><h2>Security</h2></div>
        <div className="card-b">
          <button className="big-btn" style={{ background: "var(--neg)" }} onClick={() => { try { localStorage.removeItem(AUTH_KEY); } catch (e) {} window.location.reload(); }}>Log out</button>
          <div className="note">You'll need the password to open the app again on this device.</div>
        </div>
      </div>
    </div>
  );
}

/* -------------------------------- Root ---------------------------------- */
const APP_PASSWORD = "Ahmed2030";
const AUTH_KEY = "partnership_auth_v1";

function LockScreen({ onOk }) {
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState(false);
  const submit = () => {
    if (pw === APP_PASSWORD) {
      try { localStorage.setItem(AUTH_KEY, "1"); } catch (e) {}
      onOk();
    } else {
      setErr(true);
    }
  };
  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="top">
          <h1>Partnership Ledger</h1>
          <p>Enter password to continue</p>
        </div>
        <div className="wrap">
          <div className="card">
            <div className="card-b">
              <div className="fld">
                <label>Password</label>
                <input
                  type="password"
                  value={pw}
                  autoFocus
                  onChange={(e) => { setPw(e.target.value); setErr(false); }}
                  onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
                  placeholder="••••••••"
                />
              </div>
              {err && <div className="note" style={{ color: "var(--neg)" }}>Wrong password. Try again.</div>}
              <button className="add" onClick={submit}>Unlock</button>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function App() {
  const [authed, setAuthed] = useState(() => {
    try { return localStorage.getItem(AUTH_KEY) === "1"; } catch (e) { return false; }
  });
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("overview");
  const [saved, setSaved] = useState(false);

  useEffect(() => { if (authed) loadAll().then(setData); }, [authed]);
  const set = (d) => { setData(d); saveAll(d).then(() => { setSaved(true); setTimeout(() => setSaved(false), 700); }); };

  if (!authed) return <LockScreen onOk={() => setAuthed(true)} />;
  if (!data) return <div style={{ padding: 40, textAlign: "center", color: "#7b8494" }}>Loading…</div>;

  const tabs = [
    ["overview", "Overview"],
    ...Object.keys(data.companies).map((k) => [k, data.companies[k].name]),
    ["debts", "Debts"],
    ["personal", "Personal"],
    ["settings", "Settings"],
  ];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="top">
          <h1>Partnership Ledger</h1>
          <p>{data.settings.p1} 80% · {data.settings.p2} 20%</p>
          <div className="sync"><span className={"dot" + (saved ? " on" : "")} />{saved ? "Saved" : SYNC_ON ? "Synced" : "Local"}</div>
        </div>
        <div className="tabs">
          {tabs.map(([id, label]) => (
            <button key={id} className={"tab" + (tab === id ? " active" : "")} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>
        {tab === "overview" && <Overview data={data} />}
        {tab === "settings" && <Settings data={data} set={set} />}
        {tab === "debts" && <DebtsView data={data} set={set} />}
        {tab === "personal" && <PersonalView data={data} set={set} />}
        {tab === "re" && <RealEstateView data={data} set={set} />}
        {data.companies[tab] && tab !== "re" && <CompanyView ckey={tab} data={data} set={set} />}
      </div>
    </>
  );
}






const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
